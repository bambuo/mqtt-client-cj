[package]
  cjc-version = "1.1.3"
  name = "mqtt"
  description = "An MQTT client library in Cangjie, supporting MQTT v3.1.1 and v5.0"
  version = "1.0.0"
  output-type = "static"
  license = ["MIT"]
  include = ["src", "docs", "README.md"]

[dependencies]
[target.x86_64-w64-mingw32]
  compile-option = "-Woff unused --diagnostic-format=noColor -Woff deprecated -lcrypt32"
  [target.x86_64-w64-mingw32.bin-dependencies]
    path-option = [ "${CANGJIE_STDX_PATH}" ]

[target.x86_64-unknown-linux-gnu]
  compile-option = "-Woff unused --diagnostic-format=noColor -Woff deprecated -ldl"
  [target.x86_64-unknown-linux-gnu.bin-dependencies]
    path-option = [ "${CANGJIE_STDX_PATH}" ]

[target.aarch64-unknown-linux-gnu]
  compile-option = "-Woff unused --diagnostic-format=noColor -Woff deprecated -ldl"
  [target.aarch64-unknown-linux-gnu.bin-dependencies]
    path-option = [ "${CANGJIE_STDX_PATH}" ]

[target.aarch64-apple-darwin]
  compile-option = "-Woff unused --diagnostic-format=noColor -Woff deprecated"
  link-option = "-headerpad_max_install_names -syslibroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
  [target.aarch64-apple-darwin.bin-dependencies]
    path-option = [ "${CANGJIE_STDX_PATH}" ]
